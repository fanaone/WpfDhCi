name: Build WPF Project
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Checkout main repo
        uses: actions/checkout@v4

      # 克隆私有子仓库，复用当前TOKEN授权
      - name: Clone WpfDhSrc to src folder
        uses: actions/checkout@v4
        with:
          repository: fanaone/WpfDhSrc
          path: src
          token: ${{ secrets.GET_TOKEN }}

      - name: Setup .NET 8 SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore dependencies
        run: dotnet restore ./src/WpfDhDemo/WpfDhDemo.csproj

      - name: Build project
        run: dotnet build ./src/WpfDhDemo/WpfDhDemo.csproj --configuration Release

      - name: Publish WPF App
        run: dotnet publish ./src/WpfDhDemo/WpfDhDemo.csproj -c Release --self-contained true --runtime win-x64 -p:PublishSingleFile=true -p:PublishTrimmed=true -p:TrimMode=partial
        
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: WpfDhDemo-win-x64
          path: ./src/WpfDhDemo/bin/Release/net8.0-windows/win-x64/publish/
