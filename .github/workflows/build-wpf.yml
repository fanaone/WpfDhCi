name: Build WPF Project
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Checkout main repo
        uses: actions/checkout@v4

      - name: Clone WpfDhSrc to src folder
        uses: actions/checkout@v4
        with:
          repository: fanaone/WpfDhSrc
          path: src
          token: ${{ secrets.GET_TOKEN }}

      - name: Setup .NET 9 SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Restore dependencies
        run: dotnet restore ./src/WpfDhDemo/WpfDhDemo.csproj

      - name: Build project
        run: dotnet build ./src/WpfDhDemo/WpfDhDemo.csproj --configuration Release

      - name: Publish WPF App
        run: dotnet publish ./src/WpfDhDemo/WpfDhDemo.csproj -c Release --runtime win-x64 -p:PublishSingleFile=true -p:SelfContained=false

      # 关键修复：非自包含单文件，exe在publish的上一级！
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: WpfDhDemo-win-x64
          path: ./src/WpfDhDemo/bin/Release/net9.0-windows/win-x64/
