name: Build WPF Project
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Checkout code (包含子模块)
        uses: actions/checkout@v4
        with:
          submodules: true  # 关键：强制拉取子模块代码
          recursive: true   # 递归拉取嵌套子模块

      - name: Setup .NET 8 SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore dependencies
        run: dotnet restore ./src/WpfDhDemo/WpfDhDemo.csproj

      - name: Build project
        run: dotnet build ./src/WpfDhDemo/WpfDhDemo.csproj --configuration Release
