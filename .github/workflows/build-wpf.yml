name: Build WPF Project
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Checkout main repo
        uses: actions/checkout@v4

      # 手动克隆你的子模块仓库到 src 目录
      - name: Clone submodule repo
        run: git clone https://github.com/fanaone/WpfDhSrc.git ./src

      - name: Setup .NET 8 SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore dependencies
        run: dotnet restore ./src/WpfDhDemo/WpfDhDemo.csproj

      - name: Build project
        run: dotnet build ./src/WpfDhDemo/WpfDhDemo.csproj --configuration Release
